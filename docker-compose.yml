version: '3.10'

# IMPORTANT: This docker-compose uses PostgreSQL by default.
# If you want to use SQLite instead:
# 1. Comment out the 'db' service below
# 2. Set DB_ENGINE=django.db.backends.sqlite3 in .env
# 3. Change web depends_on to remove db dependency
# 4. Remove db service from depends_on in web service

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  project_network:
    driver: bridge

services:
  # ===========================
  # PostgreSQL Database
  # ===========================
  db:
    image: postgres:17-alpine
    container_name: project_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-project_db}
      POSTGRES_USER: ${DB_USER:-project_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "5432:5432" # Remove in production to hide from host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-project_user} -d ${DB_NAME:-project_db}",
        ]
      interval: 5s # Check more frequently at start
      retries: 10
      start_period: 5s
    networks:
      - project_network

  # ===========================
  # Django Web Application
  # ===========================
  web:
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_web
    restart: unless-stopped

    # LOCAL: runserver with hot reload
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs

    # PRODUCTION: Replace command and volumes with:
    # command: gunicorn project.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --max-requests 1000 --timeout 120
    # volumes:
    #   - static_volume:/app/staticfiles
    #   - media_volume:/app/media

    ports:
      - "8000:8000"
    environment:
      - CONTAINER_ROLE=web
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - project_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      retries: 3
      start_period: 15s

  # ===========================
  # Nginx Reverse Proxy
  # ===========================
  nginx:
    image: nginx:alpine
    container_name: project_nginx
    restart: unless-stopped

    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro

    # PRODUCTION: Add HTTPS with SSL certificate
    # ports:
    #   - "80:80"
    #   - "443:443"
    # volumes:
    #   - ./nginx.conf:/etc/nginx/nginx.conf:ro
    #   - ./ssl:/etc/nginx/ssl:ro
    #   - static_volume:/app/staticfiles:ro
    #   - media_volume:/app/media:ro

    depends_on:
      - web
    networks:
      - project_network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health/",
        ]
      interval: 30s
      retries: 3
